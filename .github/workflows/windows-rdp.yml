- name: Start Cloudflare Tunnel
  run: |
    Write-Host "============================================"
    Write-Host "🚀 WINDOWS RDP - CLOUDFLARE TUNNEL"
    Write-Host "============================================"
    Write-Host ""
    
    $logFile = "cloudflared.log"
    # Запускаем cloudflared в фоне, перенаправляя вывод в файл
    $process = Start-Process -FilePath "cloudflared" -ArgumentList "tunnel --url tcp://localhost:3389" -PassThru -RedirectStandardOutput $logFile -RedirectStandardError $logFile -NoNewWindow
    Write-Host "⏳ Waiting for tunnel URL (up to 60 seconds)..."
    
    $url = $null
    for ($i = 0; $i -lt 30; $i++) {
      Start-Sleep -Seconds 2
      if (Test-Path $logFile) {
        $content = Get-Content $logFile -Raw
        if ($content -match 'https://([a-z0-9-]+)\.trycloudflare\.com') {
          $url = $matches[0]
          break
        }
      }
    }
    
    if ($url) {
      Write-Host ""
      Write-Host "✅ RDP ADDRESS: $url"
      Write-Host ""
    } else {
      Write-Host ""
      Write-Host "⚠️ Could not extract URL from logs. Check manually."
      Write-Host "   Sometimes URL appears after 30 seconds."
    }
    
    Write-Host ""
    Write-Host "📋 CONNECTION DETAILS:"
    Write-Host "   USERNAME: runneradmin"
    Write-Host "   PASSWORD: P@ssw0rd123!"
    Write-Host "   OS: Windows Server 2022"
    Write-Host "   CPU: 4 cores"
    Write-Host "   RAM: 16GB"
    Write-Host "============================================"
    
    # Keep the tunnel alive (process will run until job ends)
    Wait-Process -Id $process.Id
